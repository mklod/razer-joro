# Last modified: 2026-04-10--0400
# BLE MITM Proxy for Razer Joro keyboard

# BLE core
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_MAX_CONN=3
CONFIG_BT_DEVICE_NAME="Joro"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_GATT_DYNAMIC_DB=y

# Enable pairing so Windows can bond with us
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
# Persist bonds across resets
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Extended advertising support (Joro might use BLE 5.x features)
CONFIG_BT_EXT_ADV=y

# Device Information Service — Synapse checks VID/PID before using custom service
CONFIG_BT_DIS=y
CONFIG_BT_DIS_PNP=y
CONFIG_BT_DIS_PNP_VID_SRC=2
CONFIG_BT_DIS_PNP_VID=0x068E
CONFIG_BT_DIS_PNP_PID=0x02CE
CONFIG_BT_DIS_PNP_VER=0x0001
CONFIG_BT_DIS_MANUF="Razer"
CONFIG_BT_DIS_MODEL="Joro"

# Battery service
CONFIG_BT_BAS=y

# Increase buffer counts for relay
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_ATT_TX_COUNT=10
CONFIG_BT_BUF_ACL_TX_COUNT=7
CONFIG_BT_BUF_EVT_RX_COUNT=10

# USB CDC serial for logging
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Joro-MITM-Proxy"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Logging — RTT as primary (doesn't need USB working), CDC as secondary
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048
CONFIG_PRINTK=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_MODE_DROP=y
CONFIG_RTT_CONSOLE=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Override board default — we flash directly via SWD, no MBR/bootloader
CONFIG_FLASH_LOAD_OFFSET=0x0

# Stack sizes — BLE + USB + logging needs generous stacks
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_BT_HCI_TX_STACK_SIZE=4096
CONFIG_ISR_STACK_SIZE=4096
